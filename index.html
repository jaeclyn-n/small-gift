<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Tifany 💖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    overflow-y:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #c8a2ff,
        #ff9ecf,
        #a9d6ff
        );

    font-family:"Georgia",serif;
}

/* =====================
   INTRO SCREEN
===================== */

#intro-screen{

    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:25px;

    z-index:99999;

    background:
    linear-gradient(
        135deg,
        #ff6da5,
        #ffa3c5
    );
}

#click-text{

    color:white;

    font-size:24px;

    animation:
    pulse 1.5s infinite;
}

#popup-envelope{

    width:300px;
    height:200px;

    position:relative;

    cursor:pointer;

    transition:.4s;
}

#popup-envelope:hover{

    transform:
    scale(1.05)
    translateY(-10px);
}

.popup-base{

    position:absolute;

    width:100%;
    height:100%;

    background:#b892ff;
    
    border-radius:15px;
}

.popup-flap{

    position:absolute;

    width:100%;
    height:50%;

    background:#d7c0ff;

    clip-path:
    polygon(
        0 0,
        50% 100%,
        100% 0
    );

    transform-origin:top;

    transition:1s;
}

.popup-heart{

    position:absolute;

    width:100%;

    text-align:center;

    top:70px;

    font-size:50px;
}

#popup-envelope.open .popup-flap{

    transform:
    rotateX(180deg);
}

/* =====================
   MAIN CONTENT
===================== */

#main-content{

    display:none;
}

/* Doodles */

.top-doodle{

    position:fixed;

    top:10px;
    left:0;

    width:100%;
    height:90px;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:20px;

    z-index:100;

    pointer-events:none;
}

.doodle{

    font-size:50px;

    opacity:0;

    animation:
    doodleFade .8s forwards,
    doodleFloat 4s infinite ease-in-out;
}

.doodle:nth-child(1){
    animation-delay:.3s;
}

.doodle:nth-child(2){
    animation-delay:.6s;
}

.doodle:nth-child(3){
    animation-delay:.9s;
}

.doodle:nth-child(4){
    animation-delay:1.2s;
}

.doodle:nth-child(5){
    animation-delay:1.5s;
}

/* Container */

.container{

    position:relative;

    width:850px;
    height:850px;
}

/* Flowers */

.flower{
    position:absolute;
    z-index:2;
    opacity:0;

    animation-fill-mode:forwards;
}

.flower1{

    width:260px;
    top:20px;
    left:-150px;

    animation:
    flowerLeft 1.5s forwards;
}

.flower2{

    width:260px;
    top:20px;
    right:-190px;

    animation:
    flowerRight 1.5s forwards;
}

.flower3{

    width:260px;
    bottom:120px;
    left:-150px;

    animation:
    flowerLeft 1.8s forwards;
}

.flower4{

    width:280px;
    bottom:110px;
    right:-190px;

    animation:
    flowerRight 1.8s forwards;
}

/* Letter */

.letter{

    position:absolute;

    left:50%;

    width:500px;
    height:560px;

    top:90px;

    background:
    linear-gradient(
        180deg,
        #fffaff,
        #fff0f7
    );

    border-radius:25px;

    padding:40px;

    z-index:5;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    opacity:0;

    border:2px solid #d7c0ff;

    box-shadow:
    0 0 40px rgba(200,162,255,.8),
    0 0 25px rgba(255,158,207,.5),
    0 0 15px rgba(169,214,255,.4),
    0 15px 35px rgba(0,0,0,.12);

    transform:
    translateX(-50%)
    scale(.2);
}

#name{
    animation: glow 2s infinite;
    text-align:center;

   color:#9c6ade;

    margin-bottom:35px;

    font-size:36px;

    line-height:1.6;
}

@keyframes glow{
    50%{
        text-shadow: 0 0 15px #ff8bb7;
    }
}

#typing{

    text-align:center;

    line-height:2;

    font-size:18px;

    color:#5e5e5e;

    white-space:pre-wrap;
    
    flex:1;

    max-height:300px;

    overflow-y:auto;

    padding-right:8px;
    
}

#typing::-webkit-scrollbar{

    width:8px;
}

#typing::-webkit-scrollbar-track{

    background:#f7e8ff;

    border-radius:10px;
}

#typing::-webkit-scrollbar-thumb{

    background:
    linear-gradient(
        #c8a2ff,
        #ff9ecf,
        #a9d6ff
    );

    border-radius:10px;
}

/* Envelope bawah */

.envelope{

    position:absolute;

    bottom:0;
    left:50%;

    transform:
    translateX(-50%);

    width:520px;
    height:280px;
}

.envelope-base{

    position:absolute;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        180deg,
        #c8a2ff,
        #9c6ade
        );

    border-radius:15px;
}

.envelope-top{

    position:absolute;

    width:100%;
    height:60%;
    
    background:
    linear-gradient(
        180deg,
        #e7dcff,
        #c8a2ff
        
        );    

    clip-path:
    polygon(
        0 0,
        50% 100%,
        100% 0
    );

    transform:
    rotateX(180deg);

    z-index:1;
}

/* Music Button */

#music-toggle{

    position:fixed;

    right:20px;
    top:20px;

    z-index:999;

    border:none;

    padding:10px 14px;

    border-radius:20px;

    cursor:pointer;
}

/* Sakura */

.sakura{

    position:fixed;

    top:-30px;

    z-index:9999;

    pointer-events:none;

    animation:
    sakuraFall linear forwards;
}

/* =====================
   ANIMATIONS
===================== */

@keyframes floatLeft{

    0%,100%{

        transform:
        rotate(-50deg)
        translateY(0px);

    }

    25%{

        transform:
        rotate(-47deg)
        translateY(-10px);

    }

    50%{

        transform:
        rotate(-53deg)
        translateY(-18px);

    }

    75%{

        transform:
        rotate(-48deg)
        translateY(-8px);

    }
}

@keyframes floatRight{

    0%,100%{

        transform:
        rotate(30deg)
        translateY(0px);

    }

    25%{

        transform:
        rotate(33deg)
        translateY(-10px);

    }

    50%{

        transform:
        rotate(27deg)
        translateY(-18px);

    }

    75%{

        transform:
        rotate(32deg)
        translateY(-8px);

    }
}

@keyframes pulse{

    50%{
        transform:scale(1.08);
    }
}

@keyframes doodleFade{

    from{

        opacity:0;
        transform:
        translateY(-20px);
    }

    to{

        opacity:1;
        transform:
        translateY(0);
    }
}

@keyframes doodleFloat{

    50%{

        transform:
        translateY(10px);
    }
}

@keyframes flowerLeft{

    from{

        opacity:0;

        transform:
        translateX(-250px);
    }

    to{

        opacity:1;

        transform:
        translateX(0);
    }
}

@keyframes flowerRight{

    from{

        opacity:0;

        transform:
        translateX(250px);
    }

    to{

        opacity:1;

        transform:
        translateX(0);
    }
}

@keyframes letterAppear{

    from{

        opacity:0;

        transform:
        translateX(-50%)
        scale(.2);
    }

    to{

        opacity:1;

        transform:
        translateX(-50%)
        scale(1);
    }
}

@keyframes sakuraFall{

    from{

        transform:
        translateY(-50px)
        rotate(0deg);

        opacity:1;
    }

    to{

        transform:
        translateY(110vh)
        rotate(720deg);

        opacity:0;
    }
}

/* Flower Popup */

#flower-popup{

    position:fixed;

    inset:0;

    display:none;

    justify-content:center;

    align-items:center;

    background:
    rgba(0,0,0,.45);

    z-index:99999;
}

.popup-card{

    width:350px;

    background:white;

    border-radius:25px;

    padding:30px;

    text-align:center;

    position:relative;

    animation:
    popupAppear .5s ease;

    box-shadow:
    0 10px 40px rgba(0,0,0,.2);
}

.popup-flower{

    font-size:50px;

    margin-bottom:15px;
}

.popup-card h2{

    color:#ff6397;

    margin-bottom:15px;
}

.popup-card p{

    line-height:1.7;

    color:#8a8585;
}

#close-popup{

    position:absolute;

    right:15px;
    top:10px;

    cursor:pointer;

    font-size:20px;
}

@keyframes popupAppear{

    from{

        opacity:0;

        transform:
        scale(.7);
    }

    to{

        opacity:1;

        transform:
        scale(1);
    }
}

/* Mobile */

#gift-btn{

    display:none;

    opacity:0;

    transform:translateY(20px);

    margin:20px auto 0;

    padding:12px 20px;

    border:none;

    border-radius:20px;

    background:#d889a7;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;
}

#gift-btn:hover{

    transform:
    translateY(20px)
    scale(1.05);
}

.show-btn{

    display:block !important;

    animation:
    showButton .8s forwards;
}

@keyframes showButton{

    from{

        opacity:0;

        transform:
        translateY(20px);
    }

    to{

        opacity:1;

        transform:
        translateY(0);
    }
}

@media(max-width:768px){

#gift-btn:hover{

    transform:scale(1.05);
}

.container{

    width:100%;
    height:100vh;
}

.letter{

    width:90%;

    min-height:auto;

    padding:30px;
}

.flower{

    width:170px !important;
}
}

</style>

</head>

<body>

<!-- =========================
     INTRO SCREEN
========================= -->

<div id="intro-screen">

    <div id="popup-envelope">

        <div class="popup-base"></div>

        <div class="popup-flap"></div>

        <div class="popup-heart">
            💖
        </div>

    </div>

    <h2 id="click-text">
        Click The Envelope 💌
    </h2>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div id="main-content">

    <!-- Doodle -->

    <div class="top-doodle">

        <span class="doodle">💕</span>
        <span class="doodle">🧸</span>
        <span class="doodle">💖</span>
        <span class="doodle">🧸</span>
        <span class="doodle">💕</span>

    </div>

    <!-- Container -->

    <div class="container">

        <!-- Flowers -->

        <img src="assets/flower1.png"
             class="flower flower1">

        <img src="assets/flower2.png"
             class="flower flower2">

        <img src="assets/flower3.png"
             class="flower flower3">

        <img src="assets/flower4.png"
             class="flower flower4">

        <!-- Letter -->

        <div class="letter">

    <h1 id="name"></h1>

    <p id="typing"></p>

    <button id="gift-btn">
        💖 One More Thing...
    </button>

</div>         

        <!-- Envelope bawah -->

        <div class="envelope">

            <div class="envelope-base"></div>

            <div class="envelope-top"></div>

        </div>

    </div>

</div>

<!-- Flower Popup -->

<div id="flower-popup">

    <div class="popup-card">

        <span id="close-popup">✖</span>

        <div class="popup-flower">
            🌸💐🌷
        </div>

        <h2>For Tifany 💖</h2>

        <p>
            Thank you for being born.
            <br><br>
            Semoga semua kebahagiaan,
            kesehatan, dan impian baik
            selalu menyertaimu.
            <br><br>
            Let's meet in the fields of green
            🌸💐🌷
        </p>

    </div>

</div>

<!-- =========================
     MUSIC
========================= -->

<audio id="bg-music"
       loop
       preload="auto">

    <source
    src="music/hijo-de-la-luna.mp3.mp3" type="audio/mpeg">

</audio>

<button id="music-toggle">

    🎵 Play Music

</button>

<script>

/* =========================
   DATA SURAT
========================= */

const receiver = "Tifany";

const text =
`Selamat ulang tahun 🎂

Semoga panjang umur,
sehat selalu,
dan semua impianmu
satu per satu terwujud.

Terima kasih karena
selalu menjadi pribadi
yang baik dan membawa
warna dalam banyak cerita.

Selamat bertambah usia,
dan semoga langkahmu
selalu dipenuhi hal-hal baik.

Bulan dimana kamu dilahirkan,
adalah titik awal perjalananmu
menjadi pribadi yang kuat,
baik, dan cantik.

Tetaplah bersinar,
tetaplah tersenyum,
dan jangan pernah berhenti
menjadi dirimu sendiri.

🌸💖🌷`;

/* =========================
   ELEMENT
========================= */

const introScreen =
document.getElementById("intro-screen");

const popupEnvelope =
document.getElementById("popup-envelope");

const mainContent =
document.getElementById("main-content");

const letter =
document.querySelector(".letter");

const nameEl =
document.getElementById("name");

const typingEl =
document.getElementById("typing");

const bgMusic =
document.getElementById("bg-music");

const musicBtn =
document.getElementById("music-toggle");

/* =========================
   TITLE
========================= */

nameEl.innerHTML =
`Happy Birthday <br>💐 ${receiver} 💐`;

/* =========================
   TYPING EFFECT
========================= */

let index = 0;

function startTyping(){

    typingEl.innerHTML = "";

    index = 0;

    function type(){

    if(index < text.length){

        typingEl.innerHTML +=
        text.charAt(index);

        index++;

        setTimeout(type,70);

    }else{

        confetti({

            particleCount:150,

            spread:100,

            origin:{y:0.7}

        });

        document
.getElementById("gift-btn")
.classList.add("show-btn");

    }
}
    type();
}

/* =========================
   OPEN LETTER
========================= */

popupEnvelope.addEventListener(
"click",
openLetter
);

function openLetter(){

    popupEnvelope.classList.add(
    "open"
    );

    /* Confetti */

    confetti({

        particleCount:250,

        spread:120,

        origin:{
            y:0.6
        }
    });

    /* Tunggu amplop terbuka */

    setTimeout(()=>{

        introScreen.style.opacity =
        "0";

        introScreen.style.transition =
        "1s";

    },1000);

    setTimeout(()=>{

        introScreen.style.display =
        "none";

        mainContent.style.display =
        "block";

        showLetter();

        playMusic();

        startSakura();

    },1800);
}

/* =========================
   LETTER ANIMATION
========================= */

function showLetter(){

    letter.style.animation =
    "letterAppear 1.5s ease forwards";

    // Mulai bunga mengambang
    setTimeout(()=>{

        document.querySelectorAll(".flower")
        .forEach((flower,index)=>{

            flower.animate(
            [
                {
                    transform:
                    getComputedStyle(flower).transform
                },
                {
                    transform:
                    "translateY(-15px)"
                },
                {
                    transform:
                    "translateY(0px)"
                }
            ],
            {
                duration:4000 + index*500,
                iterations:Infinity
            });

        });

    },1800);

    setTimeout(()=>{

        startTyping();

    },1500);
}
/* =========================
   MUSIC
========================= */

function playMusic(){

    bgMusic.play()
    .catch(err=>{

        console.log(
        "Autoplay blocked",
        err
        );

    });

    musicBtn.innerHTML =
    "⏸ Pause Music";
}

musicBtn.addEventListener(
"click",
()=>{

    if(bgMusic.paused){

        bgMusic.play();

        musicBtn.innerHTML =
        "⏸ Pause Music";

    }else{

        bgMusic.pause();

        musicBtn.innerHTML =
        "🎵 Play Music";
    }
});

/* =========================
   SAKURA
========================= */

let sakuraInterval;

function createSakura(){

    const sakura =
    document.createElement("div");

    sakura.classList.add(
    "sakura"
    );

    sakura.innerHTML =
    "🌸";

    sakura.style.left =
    Math.random()*100 +
    "vw";

    sakura.style.fontSize =
    Math.random()*18+12 +
    "px";

    sakura.style.opacity =
    Math.random()*0.5+0.5;

    sakura.style.animationDuration =
    Math.random()*5+6 +
    "s";

    document.body.appendChild(
    sakura
    );

    setTimeout(()=>{

        sakura.remove();

    },12000);
}

/* =========================
   FLOATING LETTER
========================= */

setInterval(()=>{

    if(mainContent.style.display ===
       "block"){

        letter.style.transform =
        "translateX(-50%) translateY(-8px)";

        setTimeout(()=>{

            letter.style.transform =
            "translateX(-50%) translateY(0px)";

        },2000);
    }

},4000);

function startSakura(){

    sakuraInterval =
    setInterval(
    createSakura,
    350
    );
}

/* =========================
   FLOWER POPUP
========================= */

const flowerPopup =
document.getElementById(
"flower-popup"
);

const closePopup =
document.getElementById(
"close-popup"
);

document
.getElementById("gift-btn")
.addEventListener("click",()=>{
    flowerPopup.style.display ="flex";

});

closePopup
.addEventListener("click",()=>{

    flowerPopup.style.display =
    "none";

});

</script>

</body>
</html>
